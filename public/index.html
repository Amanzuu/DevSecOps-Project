<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    input {
      padding: 10px;
      width: 250px;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    li {
      margin: 10px 0;
      background: white;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1>Task Manager 🚀</h1>

  <input id="task" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>

  <script>
    // Create task
    async function addTask() {
      const title = document.getElementById('task').value;

      if (!title) {
        alert("Please enter a task");
        return;
      }

      await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });

      document.getElementById('task').value = "";
      loadTasks();
    }

    // Load tasks (THIS WAS MISSING)
    async function loadTasks() {
      const res = await fetch('/tasks');
      const data = await res.json();

      document.getElementById('list').innerHTML =
        data.map(t => `<li>${t.title}</li>`).join('');
    }

    // Load tasks on page load
    window.onload = loadTasks;
  </script>

</body>
</html>
